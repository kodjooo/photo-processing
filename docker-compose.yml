services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: photo_processing
      POSTGRES_USER: photo_user
      POSTGRES_PASSWORD: photo_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U photo_user -d photo_processing"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

  migrate:
    build: .
    env_file:
      - .env
    command: ["python", "-m", "app.main", "init-db"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - job_storage:/tmp/jobs
      - ./local-archives:/app/local-archives

  api:
    build: .
    env_file:
      - .env
    command: ["python", "-m", "app.main", "api"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 20
    volumes:
      - job_storage:/tmp/jobs
      - ./local-archives:/app/local-archives

  bot:
    build: .
    env_file:
      - .env
    command: ["python", "-m", "app.main", "bot"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - job_storage:/tmp/jobs
      - ./local-archives:/app/local-archives

  worker:
    build: .
    env_file:
      - .env
    command: ["python", "-m", "app.main", "worker"]
    depends_on:
      migrate:
        condition: service_completed_successfully
    volumes:
      - job_storage:/tmp/jobs
      - ./local-archives:/app/local-archives

volumes:
  postgres_data:
  redis_data:
  job_storage:
